<div class="container mt-5">
  <div class="row mb-4">
    <div class="col-md-8">
      <h2 class="mb-0">Payments</h2>
    </div>
    <div class="col-md-4 text-end">
      <button routerLink="/add" class="btn btn-primary btn-lg">+ Add Payment</button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Amount</th>
          <th>Currency</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of payments">
          <td>{{p.reference}}</td>
          <td>{{p.amount | currency}}</td>
          <td>
            <span class="badge bg-info">{{p.currency}}</span>
          </td>
          <td>{{p.createdAt | date: 'short'}}</td>
          <td>
            <a [routerLink]="['/edit', p.id]" class="btn btn-sm btn-warning">Edit</a>
            <button (click)="deletePayment(p.id!)" class="btn btn-sm btn-danger ms-2">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
